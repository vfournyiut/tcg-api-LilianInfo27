paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns API status.
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: TCG Backend Server is running

  /api/cards:
    get:
      tags:
        - Cards
      summary: List cards
      description: Returns the public cards catalog.
      responses:
        '200':
          description: Cards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Card'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
